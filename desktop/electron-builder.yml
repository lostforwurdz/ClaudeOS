# electron-builder config for ClaudeOS.
#
# Bundles the desktop renderer + electron main, the api-server and browser-mcp
# dist trees, plus the pinned `@anthropic-ai/claude-code` binary (dcp.9), into
# per-OS installers. Each per-platform installer carries the matching native
# binary (`pack:linux`/`pack:mac`/`pack:win` must each run on a host whose
# `npm install` resolves the right optional dependency).

appId: com.claudeos.app
productName: ClaudeOS
copyright: "(c) ClaudeOS contributors"

# Auto-update feed (dcp.11). electron-builder writes the matching `latest*.yml`
# manifests next to the installer, and electron-updater reads from this
# provider at runtime. Releases must be published to the matching GitHub repo
# (see release pipeline / pack:* scripts) for updates to surface.
#
# Codesigning is NOT yet configured here; until each platform target is signed,
# update installs will trip OS gatekeepers (macOS Gatekeeper, Windows
# SmartScreen). Track signing setup as a follow-up before enabling auto-update
# for non-developer users.
publish:
  provider: github
  owner: lostforwurdz
  repo: ClaudeOS

directories:
  output: build
  buildResources: build-resources

# Pull in the renderer bundle, the compiled electron main, and the runtime
# packages (built via the prepack script before electron-builder runs).
files:
  - "out/**/*"
  - "package.json"

# The api-server and browser-mcp packages need to be present at runtime as
# real files (the api-server's better-sqlite3 native module + playwright
# browsers can't live inside the asar). We copy them into the resources
# directory unmodified.
extraResources:
  - from: "../runtime/api-server/dist"
    to: "api-server/dist"
  - from: "../runtime/api-server/node_modules"
    to: "api-server/node_modules"
    filter: ["**/*", "!**/.cache", "!**/test", "!**/tests", "!**/*.md"]
  - from: "../packages/browser-mcp/dist"
    to: "browser-mcp/dist"
  - from: "../packages/browser-mcp/node_modules"
    to: "browser-mcp/node_modules"
    filter: ["**/*", "!**/.cache", "!**/test", "!**/tests", "!**/*.md"]
  # Pinned `@anthropic-ai/claude-code` CLI (dcp.9). The bundled-claude resolver
  # in `desktop/electron/bundled-claude.ts` looks for the binary at
  # `<resourcesPath>/claude-cli/node_modules/@anthropic-ai/claude-code/bin/claude.exe`.
  - from: "../packages/claude-cli/node_modules"
    to: "claude-cli/node_modules"
    filter: ["**/*", "!**/.cache", "!**/test", "!**/tests", "!**/*.md"]

asar: true
# Native modules that can't run from inside the asar archive.
asarUnpack:
  - "node_modules/better-sqlite3/**/*"

# -------------------------------------------------------------------------
# Per-OS targets
# -------------------------------------------------------------------------

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [arm64, x64]
  hardenedRuntime: true
  gatekeeperAssess: false

win:
  target:
    - target: nsis
      arch: [x64, arm64]

linux:
  category: Development
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
